spring.application.name=custom-mcp-server

# Prevent Spring Boot from starting any web server.
# The MCP protocol runs over STDIO (stdin/stdout), not HTTP.
spring.main.web-application-type=none

# Suppress the Spring Boot startup banner so stdout stays clean for MCP JSON-RPC.
spring.main.banner-mode=off

# Path to the lorem ipsum source file.
# Override via environment variable: LOREM_IPSUM_PATH=/absolute/path/lorem-ipsum.md
app.lorem-ipsum.path=${LOREM_IPSUM_PATH:lorem-ipsum.md}

# MCP Server metadata (visible to clients via server/info)
spring.ai.mcp.server.name=custom-lorem-ipsum-server
spring.ai.mcp.server.version=1.0.0
